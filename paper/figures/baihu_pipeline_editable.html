<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Baihu v2.0 Pipeline Editable Figure</title>
<style>
  :root{--bg:#ffffff;--page:#f8fafc;--ink:#111827;--muted:#6b7280;--border:#d1d5db;--line:#475569;--box:#eef2ff;--box2:#ecfdf5;--box3:#fff7ed;--box4:#f0f9ff;}
  body{margin:0;background:var(--page);color:var(--ink);font-family:Arial,Helvetica,sans-serif;line-height:1.5}.page{max-width:1240px;margin:0 auto;padding:28px}.panel{background:#fff;border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:22px;box-shadow:0 8px 24px rgba(15,23,42,.06)}h1{font-size:24px;margin:0 0 8px}h2{font-size:18px;margin:0 0 12px}p{color:var(--muted);margin:8px 0}.wrap{overflow:auto;border:1px solid #e5e7eb;border-radius:10px;background:white}svg{display:block;background:white;user-select:none}.draggable{cursor:move}.title{font-size:24px;font-weight:700;fill:#111827}.subtitle{font-size:14px;fill:#6b7280}.box-title{font-size:16px;font-weight:700;fill:#111827}.box-text{font-size:12px;fill:#374151}.caption{font-size:13px;fill:#4b5563}.arrow{stroke:var(--line);stroke-width:2.2;fill:none;marker-end:url(#arrowhead)}button{cursor:pointer;border:1px solid #cbd5e1;background:white;border-radius:8px;padding:8px 12px;margin:3px}button:hover{background:#f1f5f9}textarea{width:100%;min-height:160px;border:1px solid #cbd5e1;border-radius:10px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;padding:10px;box-sizing:border-box;resize:vertical}
</style>
</head>
<body>
<main class="page">
  <section class="panel">
    <h1>Baihu v2.0 construction and evaluation pipeline</h1>
    <p>Editable HTML/SVG figure. Drag text boxes or labels to adjust layout, then copy or download the SVG for the paper.</p>
    <button onclick="resetAll()">Reset layout</button>
    <button onclick="copySvg()">Copy SVG markup</button>
    <button onclick="downloadSvg()">Download SVG</button>
  </section>

  <section class="panel">
    <h2>Figure 1. Overview</h2>
    <div class="wrap">
      <svg id="fig" width="1180" height="760" viewBox="0 0 1180 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Baihu v2.0 dataset construction and evaluation pipeline">
        <defs>
          <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L10,4 L0,8 z" fill="#475569" />
          </marker>
          <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
            <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.12"/>
          </filter>
        </defs>
        <rect width="1180" height="760" fill="#ffffff"/>
        <text class="title draggable" x="70" y="54">Baihu v2.0 dataset construction and evaluation pipeline</text>
        <text class="subtitle draggable" x="70" y="82">From multi-source HDF5 robot trajectories to LeRobot v2.1 pretraining data and offline zero-shot evaluation.</text>
        <g id="diagram"></g>
        <text class="caption draggable" x="70" y="725">Figure 1: Baihu v2.0 is standardized from HDF5 source trajectories into LeRobot v2.1 format, then used for GR00T N1.6 pretraining and offline open-loop evaluation.</text>
      </svg>
    </div>
  </section>

  <section class="panel">
    <h2>SVG markup</h2>
    <textarea id="svgText" readonly></textarea>
  </section>
</main>
<script>
const svg=document.getElementById('fig');
const diagram=document.getElementById('diagram');
const svgText=document.getElementById('svgText');
const initial=[
  {id:'source',x:70,y:140,w:250,h:92,fill:'#eef2ff',title:'Multi-source robot data',lines:['Multiple embodiments and tasks','Real robot operation records']},
  {id:'hdf5',x:370,y:140,w:230,h:92,fill:'#f0f9ff',title:'HDF5 source records',lines:['Raw trajectory container','States, actions, images, metadata']},
  {id:'qc',x:650,y:140,w:230,h:92,fill:'#fff7ed',title:'Quality control',lines:['Monitoring, validation, cleaning','Manual review before release']},
  {id:'schema',x:650,y:315,w:230,h:100,fill:'#ecfdf5',title:'Schema alignment',lines:['Embodiment-specific state/action','Physical gripper and hand ranges']},
  {id:'lerobot',x:370,y:315,w:230,h:100,fill:'#f0f9ff',title:'LeRobot v2.1 conversion',lines:['Standard training format','Observation-action trajectories']},
  {id:'baihu',x:70,y:315,w:250,h:120,fill:'#eef2ff',title:'Baihu v2.0',lines:['9521.75 h · 2989 tasks','513575 episodes · 1.03B frames','14 embodiment tags']},
  {id:'pretrain',x:370,y:520,w:230,h:92,fill:'#ecfdf5',title:'GR00T N1.6 pretraining',lines:['Baihu-trained checkpoint','1 epoch on Baihu v2.0']},
  {id:'bench',x:650,y:520,w:270,h:92,fill:'#fff7ed',title:'Offline zero-shot benchmark',lines:['13 platforms · 42 records','Joint MSE ↓99.42% · ALL MSE ↓96.79%']}
];
const arrows=[['source','hdf5'],['hdf5','qc'],['qc','schema'],['schema','lerobot'],['lerobot','baihu'],['baihu','pretrain'],['pretrain','bench']];
let boxes=JSON.parse(JSON.stringify(initial));
function E(n,a={}){const e=document.createElementNS('http://www.w3.org/2000/svg',n);for(const[k,v]of Object.entries(a))e.setAttribute(k,v);return e;}
function centerRight(b){return {x:b.x+b.w,y:b.y+b.h/2};}
function centerLeft(b){return {x:b.x,y:b.y+b.h/2};}
function centerTop(b){return {x:b.x+b.w/2,y:b.y};}
function centerBottom(b){return {x:b.x+b.w/2,y:b.y+b.h};}
function draw(){diagram.innerHTML='';const map=Object.fromEntries(boxes.map(b=>[b.id,b]));
  arrows.forEach(([a,b])=>{const A=map[a],B=map[b];let p1,p2;if(Math.abs(A.y-B.y)<80){p1=centerRight(A);p2=centerLeft(B);}else if(A.y<B.y){p1=centerBottom(A);p2=centerTop(B);}else{p1=centerTop(A);p2=centerBottom(B);}const line=E('path',{d:`M ${p1.x} ${p1.y} L ${p2.x} ${p2.y}`,class:'arrow'});diagram.appendChild(line);});
  boxes.forEach(b=>{const g=E('g',{class:'draggable','data-id':b.id});const rect=E('rect',{x:b.x,y:b.y,width:b.w,height:b.h,rx:16,fill:b.fill,stroke:'#cbd5e1','stroke-width':1.3,filter:'url(#shadow)'});g.appendChild(rect);const t=E('text',{x:b.x+18,y:b.y+30,class:'box-title'});t.textContent=b.title;g.appendChild(t);b.lines.forEach((line,i)=>{const tx=E('text',{x:b.x+18,y:b.y+56+i*20,class:'box-text'});tx.textContent=line;g.appendChild(tx);});diagram.appendChild(g);});
  makeDrag(); updateSvgText();
}
function makeDrag(){let active=null,start={x:0,y:0},orig={x:0,y:0};function pt(evt){let p=svg.createSVGPoint();p.x=evt.clientX;p.y=evt.clientY;return p.matrixTransform(svg.getScreenCTM().inverse());}
  svg.querySelectorAll('.draggable').forEach(el=>{el.onpointerdown=(evt)=>{active=el;active.setPointerCapture(evt.pointerId);let p=pt(evt);start=p;if(el.dataset.id){const b=boxes.find(x=>x.id===el.dataset.id);orig={x:b.x,y:b.y};}else{orig={x:Number(el.getAttribute('x')),y:Number(el.getAttribute('y'))};}};});
  svg.onpointermove=(evt)=>{if(!active)return;let p=pt(evt),dx=p.x-start.x,dy=p.y-start.y;if(active.dataset.id){const b=boxes.find(x=>x.id===active.dataset.id);b.x=orig.x+dx;b.y=orig.y+dy;draw();}else{active.setAttribute('x',(orig.x+dx).toFixed(1));active.setAttribute('y',(orig.y+dy).toFixed(1));updateSvgText();}};
  svg.onpointerup=()=>{active=null;}; svg.onpointerleave=()=>{active=null;};
}
function serialize(){const s=svg.cloneNode(true);s.setAttribute('xmlns','http://www.w3.org/2000/svg');return new XMLSerializer().serializeToString(s);}
function updateSvgText(){svgText.value=serialize();}
async function copySvg(){updateSvgText();await navigator.clipboard.writeText(svgText.value);alert('SVG copied.');}
function downloadSvg(){updateSvgText();const blob=new Blob([svgText.value],{type:'image/svg+xml;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='baihu_v2_pipeline.svg';document.body.appendChild(a);a.click();a.remove();}
function resetAll(){boxes=JSON.parse(JSON.stringify(initial));draw();}
draw();
</script>
</body>
</html>
